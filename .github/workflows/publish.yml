name: Publish Python package to PyPI

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:  # allows manual re-runs without a new tag

permissions:
  contents: read

jobs:
  verify:
    name: Verify tag matches pyproject.toml version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Tag ↔ pyproject.toml version check
        run: |
          # Skip check on workflow_dispatch (no tag context)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — skipping tag/version check"
            exit 0
          fi
          TAG="${GITHUB_REF_NAME#v}"
          PY_VER=$(grep '^version' fossic-py/pyproject.toml | head -1 | cut -d'"' -f2)
          if [ "$TAG" != "$PY_VER" ]; then
            echo "::error::Tag ($TAG) ≠ fossic-py/pyproject.toml version ($PY_VER)."
            exit 1
          fi
          echo "Version: $PY_VER"

  build-wheels:
    name: Build wheels (${{ matrix.os }})
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Set up QEMU (Linux aarch64 cross-compilation)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: pypa/cibuildwheel@v4.1.0
        with:
          package-dir: fossic-py
          config-file: .cibuildwheel.toml
      - uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build-sdist:
    name: Build sdist
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: dtolnay/rust-toolchain@stable
      - name: Install maturin
        run: pip install maturin
      - name: Build sdist
        working-directory: fossic-py
        run: maturin sdist --out dist
      - uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: fossic-py/dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
