name: Publish Python package to PyPI

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:  # allows manual re-runs without a new tag

permissions:
  contents: read

jobs:
  verify:
    name: Verify tag matches pyproject.toml version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag ↔ pyproject.toml version check
        run: |
          # Skip check on workflow_dispatch (no tag context)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — skipping tag/version check"
            exit 0
          fi
          TAG="${GITHUB_REF_NAME#v}"
          PY_VER=$(grep '^version' fossic-py/pyproject.toml | head -1 | cut -d'"' -f2)
          if [ "$TAG" != "$PY_VER" ]; then
            echo "::error::Tag ($TAG) ≠ fossic-py/pyproject.toml version ($PY_VER)."
            exit 1
          fi
          echo "Version: $PY_VER"

  build-wheels:
    name: Build wheel on ${{ matrix.os }} py${{ matrix.python }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps (Linux only — glib for tauri workspace transitive)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev pkg-config
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install maturin
        run: pip install maturin
      - name: Build wheel
        working-directory: fossic-py
        run: maturin build --release --out dist --interpreter python${{ matrix.python }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python }}
          path: fossic-py/dist/*.whl

  build-sdist:
    name: Build sdist
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps (glib for tauri workspace transitive)
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev pkg-config
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install maturin
        run: pip install maturin
      - name: Build sdist
        working-directory: fossic-py
        run: maturin sdist --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: fossic-py/dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
